# Trading Universe Configuration
# Coins with 4000+ bars of 4H history on Binance (sufficient for model training)
tradeable_pairs:
  - BTC/USD
  - ETH/USD
  - BNB/USD
  - SOL/USD
  - ADA/USD
  - AVAX/USD
  - DOGE/USD
  - LINK/USD
  - DOT/USD
  - UNI/USD
  - XRP/USD
  - LTC/USD
  - AAVE/USD
  - CRV/USD
  - NEAR/USD
  - FIL/USD
  - FET/USD
  - HBAR/USD
  - ZEC/USD
  - ZEN/USD
  - CAKE/USD
  - PAXG/USD
  - XLM/USD
  - TRX/USD
  - CFX/USD
  - SHIB/USD
  - ICP/USD
  - APT/USD
  - ARB/USD
  - SUI/USD
  - FLOKI/USD
  - PEPE/USD
  - PENDLE/USD
  - WLD/USD
  - SEI/USD
  - BONK/USD
  - WIF/USD
  - ENA/USD
  - TAO/USD

feature_pairs:
  - BTC/USD
  - ETH/USD
  - SOL/USD

candle_interval: "4h"
max_positions: 5

# Cooldown
trade_cooldown_seconds: 65

# Risk Management
hard_stop_pct: 0.05
atr_stop_multiplier: 2.0
trailing_stop_multiplier: 1.5

# Circuit Breaker (Tiered)
circuit_breaker:
  halt_threshold: 0.30
  reduce_heavy_threshold: 0.20
  reduce_light_threshold: 0.10

# Data Pipeline
warmup_bars: 35
regime_warmup_bars: 300

# Regime Detection
regime:
  ema_fast: 20
  ema_slow: 50
  confirmation_bars: 2

# Portfolio Optimization
risk_per_trade_pct: 0.02
expected_win_loss_ratio: 1.5
cvar_beta: 0.95
hrp_blend: 0.5

# Logging
log_level: "INFO"
log_max_bytes: 10485760
log_backup_count: 10
